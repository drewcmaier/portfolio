<!doctype html>
<html lang="en">
	<title>Drew Maier's portfolio</title>

	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="alternate icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<meta name="viewport" content="width=device-width" />
		<meta
			name="description"
			content="Drew Maier — Staff Software Engineer at Indeed. Frontend craft for web, games, and mobile. Based in the Philadelphia area."
		/>
		<meta name="author" content="Drew Maier" />
		<meta property="og:title" content="Drew Maier" />
		<meta
			property="og:description"
			content="Staff Software Engineer at Indeed. Frontend craft for web, games, and mobile."
		/>
		<meta property="og:type" content="website" />
		<script>
			// Apply theme from localStorage immediately to prevent flash
			(function () {
				const stored = localStorage.getItem('theme');
				const theme =
					stored === 'light' || stored === 'dark'
						? stored
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
